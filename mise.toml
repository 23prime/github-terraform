# ================================================================
# Settings
# ================================================================
[settings]
auto_install = false
install_before = "3d"


# ================================================================
# Tools
# ================================================================
[tools]

# Markdown
markdownlint-cli2 = "0.22"

# GitHub Actions
actionlint = "1"
shellcheck = "0.11"
"github:zizmorcore/zizmor" = "1"

# Other tools
lefthook = "2"
cspell = "10"

# Terraform
terraform = "1"

# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "gh-fix", "tf-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = ["md-check", "gh-check", "spell-check", "tf-check"]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 '**/*.md' --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 '**/*.md'"
alias = "mc"

# GitHub Actions
[tasks.gh-fix]
description = "Fix GitHub Actions workflows"
run = "zizmor --fix=all ."
alias = "ghf"

[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = [
  "actionlint .github/workflows/*.yml",
  "zizmor . --persona=pedantic --min-severity=medium",
]
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Terraform
[tasks.tf-init]
description = "Initialize Terraform"
run = "terraform init"
dir = "terraform"
alias = "tfi"

[tasks.tf-init-nobackend]
description = "Initialize Terraform without backend"
run = "terraform init -backend=false"
dir = "terraform"

[tasks.tf-init-upgrade]
description = "Initialize Terraform with provider upgrade"
run = "terraform init -upgrade"
dir = "terraform"

[tasks.tf-plan]
description = "Plan Terraform changes"
run = "terraform plan"
dir = "terraform"
alias = "tfp"

[tasks.tf-apply]
description = "Apply Terraform changes"
run = "terraform apply -auto-approve"
dir = "terraform"
alias = "tfa"

[tasks.tf-apply-ask]
description = "Apply Terraform changes with confirmation prompt"
run = "terraform apply"
dir = "terraform"

[tasks.tf-destroy]
description = "Destroy Terraform infrastructure"
run = "terraform destroy"
dir = "terraform"

[tasks.tf-fix]
description = "Format Terraform files"
run = "terraform fmt -recursive"
dir = "terraform"

[tasks.tf-check]
description = "Check Terraform configuration"
run = ["terraform validate", "terraform fmt -check -recursive"]
dir = "terraform"

[tasks.tf-workspace]
description = "Show current workspace"
run = "terraform workspace show"
dir = "terraform"

[tasks.tf-output]
description = "Show Terraform outputs"
run = "terraform output"
dir = "terraform"

[tasks.tf-state]
description = "Show Terraform state"
run = "terraform state list"
dir = "terraform"

[tasks.tf-import-repo]
description = "Import existing repository"
run = "terraform import 'module.repository[\"{{arg()}}\"].github_repository.this' {{arg()}}"
dir = "terraform"

[tasks.tf-exclude-repo]
description = "Exclude a repository from management"
run = [
  "terraform state rm 'module.repository[\"{{arg()}}\"].github_repository.this' || true",
  "terraform state rm 'module.repository[\"{{arg()}}\"].github_repository_dependabot_security_updates.this[0]' || true",
  "terraform state rm 'module.repository[\"{{arg()}}\"].github_repository_ruleset.main_branch_protection[0]' || true",
  "terraform state rm 'module.repository[\"{{arg()}}\"].github_actions_repository_permissions.this[0]' || true",
  "terraform state rm 'module.repository[\"{{arg()}}\"].github_workflow_repository_permissions.this[0]' || true",
]
dir = "terraform"
